app = "webpage-to-markdown-api"
primary_region = "iad"

[http_service]
auto_start_machines = true
auto_stop_machines = false
force_https = true
internal_port = 8_080
min_machines_running = 0
processes = [ "app" ]

[build]
  builder = "paketobuildpacks/builder:base"
  buildpacks = ["paketo-community/python"]

[env]
  BP_PIP_VERSION = "24.0"
  PORT = "8080"

[[vm]]
cpu_kind = "shared"
cpus = 1
memory = "1gb"
memory_mb = 256
