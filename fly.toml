app = "webpage-to-markdown-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
auto_start_machines = true
auto_stop_machines = false
force_https = true
internal_port = 8_080
min_machines_running = 0
processes = [ "app" ]

[env]
  PORT = "8080"

[[vm]]
cpu_kind = "shared"
cpus = 1
memory = "1gb"
memory_mb = 256
