# fly.toml — Webpage-to-Markdown API
app = "webpage-to-markdown"

[build]
  builder = "paketobuildpacks/builder:base"
  buildpacks = ["paketo-community/python"]

[env]
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[services]]
  protocol = "tcp"
  internal_port = 8080

  [[services.ports]]
    port = 443
    handlers = ["tls"]
  [[services.ports]]
    port = 80
    handlers = ["http"]

  [services.concurrency]
    type = "requests"
    hard_limit = 100
    soft_limit = 50
